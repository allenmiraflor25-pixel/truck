function getPeriod(startDay, monthOffset = 0, now = new Date()) {
  const d = new Date(now);
  const safeStart = Math.min(Math.max(1, startDay), 28);
  let start, end;
  if (d.getDate() >= safeStart) {
    start = new Date(d.getFullYear(), d.getMonth() + monthOffset, safeStart);
    end   = new Date(d.getFullYear(), d.getMonth() + monthOffset + 1, safeStart);
  } else {
    start = new Date(d.getFullYear(), d.getMonth() + monthOffset - 1, safeStart);
    end   = new Date(d.getFullYear(), d.getMonth() + monthOffset, safeStart);
  }
  return { start, end };
}

function projectRecurring(recurring, period) {
  const occurrences = [];
  for (const r of recurring) {
    if (!r.active) continue;
    let d = new Date(period.start);
    while (d < period.end) {
      if (d.getDate() === r.dayOfMonth) {
        occurrences.push({ id: `rec-${r.id}-${d.toISOString().slice(0,10)}`, recurringId: r.id, note: r.name, amount: r.amount, categoryId: r.categoryId, accountId: r.accountId, date: d.toISOString(), type: r.type, isRecurring: true });
        break;
      }
      d.setDate(d.getDate() + 1);
    }
  }
  return occurrences;
}

function fmtMoney(n, currency = "USD") {
  const sym = CURRENCIES[currency] || "";
  const abs = Math.abs(n);
  const formatted = abs.toLocaleString(undefined, { minimumFractionDigits: abs < 10 && abs !== 0 ? 2 : 0, maximumFractionDigits: 2 });
  return (n < 0 ? "-" : "") + sym + formatted;
}

function relDay(d) {
  const date = new Date(d);
  const today = new Date(); today.setHours(0,0,0,0);
  const tgt = new Date(date); tgt.setHours(0,0,0,0);
  const diff = Math.round((tgt - today) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  if (diff > 1 && diff <= 7) return `in ${diff} days`;
  if (diff < -1 && diff >= -7) return `${-diff} days ago`;
  return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function savingRateBand(rate) {
  if (rate >= 20) return { label: "Excellent", color: "#10b981", glow: "rgba(16,185,129,0.35)" };
  if (rate >= 15) return { label: "Strong",    color: "#22d3ee", glow: "rgba(34,211,238,0.35)" };
  if (rate >= 8)  return { label: "Building",  color: "#fbbf24", glow: "rgba(251,191,36,0.35)" };
  return            { label: "Starting",  color: "#fb7185", glow: "rgba(251,113,133,0.35)" };
}

function accountBalance(acc, transactions, asOf = new Date()) {
  let bal = acc.startingBalance || 0;
  const cut = new Date(asOf);
  for (const t of transactions) {
    if (new Date(t.date) > cut) continue;
    if (t.type === "income"  && t.accountId === acc.id)   bal += t.amount;
    else if (t.type === "expense" && t.accountId === acc.id) bal -= t.amount;
    else if (t.type === "transfer") {
      if (t.accountId === acc.id)   bal -= t.amount;
      if (t.toAccountId === acc.id) bal += t.amount;
    }
  }
  return bal;
}

function normalize(s) {
  const accounts = s.accounts && s.accounts.length ? s.accounts : DEFAULT_ACCOUNTS;
  const defAcc = accounts[0] && accounts[0].id;
  return {
    ...DEFAULT_STATE, ...s,
    settings: { ...DEFAULT_STATE.settings, ...(s.settings || {}) },
    accounts,
    categories: s.categories && s.categories.length ? s.categories : DEFAULT_CATEGORIES,
    transactions: (s.transactions || []).map((t) => ({ ...t, accountId: t.accountId || defAcc })),
    recurring: (s.recurring || []).map((r) => ({ ...r, accountId: r.accountId || defAcc })),
  };
}

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return normalize(JSON.parse(raw)); } catch (e) {}
  return DEFAULT_STATE;
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.error(e); }
}

function Icon({ name, size = 16, className = "", style = {}, strokeWidth = 2 }) {
  const sp = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth, strokeLinecap: "round", strokeLinejoin: "round", className, style };

function MiniArea({ data, color }) {
  if (!data.length) return null;
  const max = Math.max(...data.map(d => d.value), 1);
  const w = 300, h = 96, padX = 16, padTop = 8, padBottom = 18;
  const innerH = h - padTop - padBottom;
  const step = data.length > 1 ? (w - padX*2) / (data.length - 1) : 0;
  const pts = data.map((d, i) => [padX + i*step, padTop + innerH - (d.value/max)*innerH]);
  const line = pts.map((p,i) => `${i===0?"M":"L"} ${p[0]} ${p[1]}`).join(" ");
  const area = `${line} L ${pts[pts.length-1][0]} ${padTop+innerH} L ${pts[0][0]} ${padTop+innerH} Z`;
  const id = `g-${color.replace("#","")}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full" preserveAspectRatio="none">
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.5"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i) => <text key={i} x={padX+i*step} y={h-4} fill="rgba(255,255,255,0.35)" fontSize="10" textAnchor="middle">{d.label}</text>)}
    </svg>
  );
}

function MiniBar({ data }) {
  if (!data.length) return null;
  const max = Math.max(...data.map(d => d.value), 1);
  const w = 300, h = 128, padX = 14, padTop = 8, padBottom = 18;
  const innerH = h - padTop - padBottom;
  const cellW = (w - padX*2) / data.length, barW = cellW * 0.62;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full" preserveAspectRatio="none">
      {data.map((d,i) => {
        const x = padX + i*cellW + (cellW-barW)/2;
        const barH = (d.value/max)*innerH;
        return (<g key={i}><rect x={x} y={padTop+innerH-barH} width={barW} height={Math.max(barH,2)} rx="6" fill={d.isCurrent ? "#22d3ee" : "rgba(255,255,255,0.18)"}/><text x={x+barW/2} y={h-4} fill="rgba(255,255,255,0.4)" fontSize="10" textAnchor="middle">{d.label}</text></g>);
      })}
    </svg>
  );
}

function Donut({ segments, size = 128, thickness = 20 }) {
  const total = segments.reduce((s,x) => s+x.value, 0);
  if (total === 0) return null;
  const cx = size/2, cy = size/2, r = size/2 - thickness/2 - 2;
  if (segments.length === 1) return <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full"><circle cx={cx} cy={cy} r={r} fill="none" stroke={segments[0].color} strokeWidth={thickness}/></svg>;
  let angle = -Math.PI/2; const gap = 0.02;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full">
      {segments.map((seg,i) => {
        const sweep = (seg.value/total)*Math.PI*2;
        const start = angle + gap/2, end = angle + sweep - gap/2; angle += sweep;
        const x1 = cx + r*Math.cos(start), y1 = cy + r*Math.sin(start);
        const x2 = cx + r*Math.cos(end),   y2 = cy + r*Math.sin(end);
        const large = (end-start) > Math.PI ? 1 : 0;
        return <path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`} fill="none" stroke={seg.color} strokeWidth={thickness}/>;
      })}
    </svg>
  );
}

function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("home");
  const [periodOffset, setPeriodOffset] = useState(0);
  const [addOpen, setAddOpen] = useState(false);
  const [addType, setAddType] = useState("expense");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [settingsTab, setSettingsTab] = useState("general");
  const [recurringOpen, setRecurringOpen] = useState(false);
  const [editTxn, setEditTxn] = useState(null);
  const [acctFilter, setAcctFilter] = useState(null);

  useEffect(() => { const t = setTimeout(() => saveState(state), 200); return () => clearTimeout(t); }, [state]);

  const { settings, accounts, categories, transactions, recurring } = state;
  const catMap = useMemo(() => Object.fromEntries(categories.map((c) => [c.id, c])), [categories]);
  const accMap = useMemo(() => Object.fromEntries(accounts.map((a) => [a.id, a])), [accounts]);
  const period = useMemo(() => getPeriod(settings.periodStartDay, periodOffset), [settings.periodStartDay, periodOffset]);

  const periodTxns = useMemo(() => {
    const manual = transactions.filter((t) => { const d = new Date(t.date); return d >= period.start && d < period.end; });
    const projected = projectRecurring(recurring, period).filter((p) => !transactions.some((t) => t.recurringId === p.recurringId && new Date(t.date).toDateString() === new Date(p.date).toDateString()));
    return [...manual, ...projected].sort((a,b) => new Date(b.date) - new Date(a.date));
  }, [transactions, recurring, period]);

  const today = new Date(); today.setHours(23,59,59,999);
  const totals = useMemo(() => {
    let actualExpense = 0, actualIncome = 0, plannedExpense = 0, plannedIncome = 0;
    for (const t of periodTxns) {
      if (t.type === "transfer") continue;
      const future = new Date(t.date) > today;
      if (t.type === "expense") future ? plannedExpense += t.amount : actualExpense += t.amount;
      else                      future ? plannedIncome  += t.amount : actualIncome  += t.amount;
    }
    const incomeBase = Math.max(settings.expectedIncome || 0, actualIncome + plannedIncome);
    const leftToSpend = incomeBase - actualExpense - plannedExpense;
    const savingRate = incomeBase > 0 ? ((incomeBase - actualExpense - plannedExpense) / incomeBase) * 100 : 0;
    return { actualExpense, actualIncome, plannedExpense, plannedIncome, incomeBase, leftToSpend, savingRate };
  }, [periodTxns, settings.expectedIncome]);

  const upsertTxn = (t) => setState((s) => { const e = s.transactions.find((x) => x.id === t.id); return { ...s, transactions: e ? s.transactions.map((x) => x.id === t.id ? t : x) : [...s.transactions, t] }; });
  const deleteTxn = (id) => setState((s) => ({ ...s, transactions: s.transactions.filter((t) => t.id !== id) }));
  const materialise = (p) => { const real = { id: uid(), amount: p.amount, categoryId: p.categoryId, accountId: p.accountId, date: p.date, note: p.note, type: p.type, recurringId: p.recurringId }; upsertTxn(real); return real; };
  const upsertRecurring = (r) => setState((s) => { const e = s.recurring.find((x) => x.id === r.id); return { ...s, recurring: e ? s.recurring.map((x) => x.id === r.id ? r : x) : [...s.recurring, r] }; });
  const deleteRecurring = (id) => setState((s) => ({ ...s, recurring: s.recurring.filter((r) => r.id !== id) }));
  const upsertCategory = (c) => setState((s) => { const e = s.categories.find((x) => x.id === c.id); return { ...s, categories: e ? s.categories.map((x) => x.id === c.id ? c : x) : [...s.categories, c] }; });
  const deleteCategory = (id) => setState((s) => ({ ...s, categories: s.categories.filter((c) => c.id !== id) }));
  const upsertAccount = (a) => setState((s) => { const e = s.accounts.find((x) => x.id === a.id); return { ...s, accounts: e ? s.accounts.map((x) => x.id === a.id ? a : x) : [...s.accounts, a] }; });
  const deleteAccount = (id) => setState((s) => { if (s.accounts.length <= 1) return s; return { ...s, accounts: s.accounts.filter((a) => a.id !== id) }; });
  const updateSettings = (patch) => setState((s) => ({ ...s, settings: { ...s.settings, ...patch } }));
  const openAdd = (type = "expense") => { setAddType(type); setAddOpen(true); };
  const openSettingsAt = (t) => { setSettingsTab(t); setSettingsOpen(true); };

  const exportCSV = () => {
    const rows = [["date","type","amount","category","account","to_account","note"]];
    transactions.forEach((t) => { rows.push([new Date(t.date).toISOString(), t.type, t.amount.toString(), catMap[t.categoryId]?.name || "", accMap[t.accountId]?.name || "", accMap[t.toAccountId]?.name || "", (t.note || "").replace(/"/g,'""')]); });
    const csv = rows.map((r) => r.map((v) => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `truck-export-${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
  };
  const importCSV = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const lines = e.target.result.split(/\r?\n/).filter(Boolean);
        const header = lines.shift().split(",").map((h) => h.replace(/^"|"$/g,"").trim().toLowerCase());
        const idx = (n) => header.indexOf(n);
        const newTxns = []; let wa = [...accounts], wc = [...categories];
        const findAcc = (name) => { if (!name) return wa[0]?.id; let a = wa.find((x) => x.name.toLowerCase() === name.toLowerCase()); if (!a) { a = { id: uid(), name, type: "other", emoji: "👛", color: "#94a3b8", startingBalance: 0 }; wa.push(a); } return a.id; };
        for (const line of lines) {
          const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g)?.map((s) => s.replace(/^"|"$/g,"")) || [];
          const type = (cols[idx("type")] || "expense").trim();
          const catName = cols[idx("category")]?.trim();
          let cat = wc.find((c) => c.name.toLowerCase() === catName?.toLowerCase());
          if (!cat && type !== "transfer") { cat = { id: uid(), name: catName || "Imported", emoji: "📦", color: "#94a3b8", type }; wc.push(cat); }
          newTxns.push({ id: uid(), date: new Date(cols[idx("date")]).toISOString(), type, amount: parseFloat(cols[idx("amount")]) || 0, categoryId: cat?.id, accountId: findAcc(cols[idx("account")]?.trim()), toAccountId: type === "transfer" ? findAcc(cols[idx("to_account")]?.trim()) : undefined, note: cols[idx("note")] || "" });
        }
        setState((s) => ({ ...s, accounts: wa, categories: wc, transactions: [...s.transactions, ...newTxns] }));
      } catch (err) { alert("Import failed. Expected columns: date, type, amount, category, account, to_account, note"); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="min-h-screen text-white">
      <BackgroundMesh/>
      <div className="mx-auto max-w-[480px] px-4 pt-4 pb-32">
        <Header period={period} periodOffset={periodOffset} setPeriodOffset={setPeriodOffset} onOpenSettings={() => openSettingsAt("general")}/>
        {tab === "home" && (<HomeScreen totals={totals} periodTxns={periodTxns} accounts={accounts} transactions={transactions} catMap={catMap} accMap={accMap} settings={settings} onEditTxn={(t) => setEditTxn(t.isRecurring ? materialise(t) : t)} onOpenAll={() => setTab("transactions")} onManageAccounts={() => openSettingsAt("accounts")} onAddTransfer={() => openAdd("transfer")}/>)}
        {tab === "transactions" && (<TransactionsScreen periodTxns={periodTxns} catMap={catMap} accMap={accMap} accounts={accounts} settings={settings} acctFilter={acctFilter} setAcctFilter={setAcctFilter} onEditTxn={(t) => setEditTxn(t.isRecurring ? materialise(t) : t)}/>)}
        {tab === "insights" && (<InsightsScreen state={state} catMap={catMap} settings={settings} period={period} totals={totals}/>)}
        {tab === "planned" && (<PlannedScreen periodTxns={periodTxns} recurring={recurring} catMap={catMap} accMap={accMap} settings={settings} onOpenRecurring={() => setRecurringOpen(true)} onDeleteRecurring={deleteRecurring} onToggleRecurring={(r) => upsertRecurring({ ...r, active: !r.active })}/>)}
      </div>
      <TabBar tab={tab} setTab={setTab} onAdd={() => openAdd("expense")}/>
      {(addOpen || editTxn) && (<AddSheet initial={editTxn} startType={addType} categories={categories} accounts={accounts} settings={settings} onClose={() => { setAddOpen(false); setEditTxn(null); }} onSave={(t) => { upsertTxn(t); setAddOpen(false); setEditTxn(null); }} onDelete={editTxn ? (id) => { deleteTxn(id); setEditTxn(null); } : null}/>)}
      {settingsOpen && (<SettingsSheet settings={settings} categories={categories} accounts={accounts} transactions={transactions} initialTab={settingsTab} onClose={() => setSettingsOpen(false)} onUpdate={updateSettings} onUpsertCategory={upsertCategory} onDeleteCategory={deleteCategory} onUpsertAccount={upsertAccount} onDeleteAccount={deleteAccount} onExportCSV={exportCSV} onImportCSV={importCSV} onReset={() => { if (confirm("Erase ALL data? This cannot be undone.")) setState(DEFAULT_STATE); }}/>)}
      {recurringOpen && (<RecurringSheet categories={categories} accounts={accounts} settings={settings} onClose={() => setRecurringOpen(false)} onUpsert={upsertRecurring}/>)}
    </div>
  );
}

function Header({ period, periodOffset, setPeriodOffset, onOpenSettings }) {
  const isCurrent = periodOffset === 0;
  const fmt = (d) => d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  return (
    <div className="flex items-center justify-between mb-5 mt-2">
      <div>
        <div className="text-2xl font-bold uppercase tracking-[0.18em] bg-gradient-to-r from-cyan-300 via-white to-fuchsia-300 bg-clip-text text-transparent" style={{ filter: "drop-shadow(0 0 12px rgba(34,211,238,0.25))" }}>Truck</div>
        <div className="flex items-center gap-2 mt-1">
          <button className="p-1 rounded-lg hover:bg-white/5 active:scale-95 transition" onClick={() => setPeriodOffset(periodOffset - 1)}><Icon name="chevronLeft" size={16} className="text-white/60"/></button>
          <div className="text-sm font-medium tabular-nums">{fmt(period.start)} – {fmt(new Date(period.end.getTime() - 86400000))}</div>
          <button className="p-1 rounded-lg hover:bg-white/5 active:scale-95 transition disabled:opacity-30" disabled={isCurrent} onClick={() => setPeriodOffset(periodOffset + 1)}><Icon name="chevronRight" size={16} className="text-white/60"/></button>
        </div>
      </div>
      <button onClick={onOpenSettings} className="p-2.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-xl active:scale-95 transition"><Icon name="settings" size={18} className="text-white/80"/></button>
    </div>
  );
}

function HomeScreen({ totals, periodTxns, accounts, transactions, catMap, accMap, settings, onEditTxn, onOpenAll, onManageAccounts, onAddTransfer }) {
  const band = savingRateBand(totals.savingRate);
  const recent = periodTxns.slice(0, 6);
  const spentPct = totals.incomeBase > 0 ? Math.min(100, (totals.actualExpense/totals.incomeBase)*100) : 0;
  const plannedPct = totals.incomeBase > 0 ? Math.min(100-spentPct, (totals.plannedExpense/totals.incomeBase)*100) : 0;
  const netWorth = useMemo(() => accounts.reduce((s,a) => s + accountBalance(a, transactions), 0), [accounts, transactions]);
  return (
    <div className="space-y-4">
      <Glass className="p-6 overflow-hidden">
        <div className="absolute -top-20 -right-20 h-64 w-64 rounded-full blur-3xl opacity-40 pointer-events-none" style={{ background: `radial-gradient(circle, ${band.color} 0%, transparent 70%)` }}/>
        <div className="flex items-center gap-2 text-white/50 text-xs uppercase tracking-[0.18em] mb-2"><Icon name="wallet" size={12}/> Left to spend</div>
        <div className="text-[52px] leading-none font-semibold tabular-nums tracking-tight" style={{ textShadow: `0 0 40px ${band.glow}` }}>{fmtMoney(totals.leftToSpend, settings.currency)}</div>
        <div className="mt-3 text-xs text-white/50">after all recurring bills • {Math.round(totals.savingRate)}% saving rate</div>
        <div className="relative h-2 mt-5 w-full rounded-full bg-white/[0.06] overflow-hidden">
          <div className="absolute inset-y-0 left-0 rounded-full" style={{ width: `${spentPct}%`, background: "linear-gradient(90deg,#f43f5e,#fb7185)" }}/>
          <div className="absolute inset-y-0 rounded-full" style={{ left: `${spentPct}%`, width: `${plannedPct}%`, background: "linear-gradient(90deg,#fbbf24,#f59e0b)", opacity: 0.55 }}/>
        </div>
        <div className="grid grid-cols-3 gap-2 mt-5 text-[11px]">
          <Stat label="Spent" value={fmtMoney(totals.actualExpense, settings.currency)} color="#fb7185"/>
          <Stat label="Planned" value={fmtMoney(totals.plannedExpense, settings.currency)} color="#fbbf24"/>
          <Stat label="Income" value={fmtMoney(totals.incomeBase, settings.currency)} color="#22d3ee"/>
        </div>
      </Glass>

      <Glass className="p-4">
        <div className="flex items-center justify-between mb-3">
          <div><div className="text-[11px] uppercase tracking-[0.16em] text-white/50">Net worth</div><div className="text-2xl font-semibold tabular-nums">{fmtMoney(netWorth, settings.currency)}</div></div>
          <div className="flex items-center gap-2">
            <button onClick={onAddTransfer} className="px-3 py-1.5 rounded-full text-xs border border-white/10 bg-white/[0.04] active:scale-95 transition flex items-center gap-1"><Icon name="arrowLeftRight" size={12}/> Transfer</button>
            <button onClick={onManageAccounts} className="px-3 py-1.5 rounded-full text-xs border border-white/10 bg-white/[0.04] active:scale-95 transition">Manage</button>
          </div>
        </div>
        <div className="flex gap-2.5 overflow-x-auto pb-1 -mx-1 px-1">
          {accounts.map((a) => { const bal = accountBalance(a, transactions); return (
            <div key={a.id} className="min-w-[132px] rounded-2xl p-3 border" style={{ borderColor: a.color + "33", background: a.color + "12" }}>
              <div className="flex items-center gap-1.5"><span className="text-lg">{a.emoji}</span><span className="text-[11px] text-white/60 truncate">{a.name}</span></div>
              <div className={`mt-2 text-lg font-semibold tabular-nums ${bal < 0 ? "text-rose-300" : "text-white"}`}>{fmtMoney(bal, settings.currency)}</div>
              <div className="text-[9px] uppercase tracking-wider text-white/35 mt-0.5">{ACCOUNT_TYPES[a.type]?.label || a.type}</div>
            </div>); })}
        </div>
      </Glass>

      <Glass className="p-4 flex items-center justify-between">
        <div><div className="text-xs text-white/50 uppercase tracking-[0.16em]">Saving rate</div><div className="flex items-baseline gap-2 mt-1"><div className="text-2xl font-semibold tabular-nums">{totals.savingRate.toFixed(1)}%</div><Pill color={band.color} glow={band.glow}>{band.label}</Pill></div></div>
        <Icon name="target" size={28} style={{ color: band.color, filter: `drop-shadow(0 0 14px ${band.glow})` }}/>
      </Glass>

      <div className="flex items-center justify-between mt-2 mb-2 px-1"><div className="text-sm font-medium text-white/80">Recent</div><button onClick={onOpenAll} className="text-xs text-white/50 active:scale-95 transition flex items-center gap-1">View all <Icon name="chevronRight" size={12}/></button></div>
      {recent.length === 0 ? (<Glass className="p-6 text-center text-white/40 text-sm">No transactions yet. Tap <Icon name="plus" size={14} className="inline"/> to add your first.</Glass>) : (<Glass className="divide-y divide-white/5 overflow-hidden">{recent.map((t) => <TxnRow key={t.id} txn={t} cat={catMap[t.categoryId]} accMap={accMap} currency={settings.currency} onClick={() => onEditTxn(t)}/>)}</Glass>)}
    </div>
  );
}

function Stat({ label, value, color }) {
  return (<div className="flex flex-col"><div className="flex items-center gap-1 text-white/40 uppercase tracking-[0.12em]"><span className="h-1.5 w-1.5 rounded-full" style={{ background: color }}/>{label}</div><div className="mt-0.5 text-[13px] font-medium tabular-nums">{value}</div></div>);
}

function TxnRow({ txn, cat, accMap, currency, onClick }) {
  const isTransfer = txn.type === "transfer";
  const isExpense = txn.type === "expense";
  if (isTransfer) {
    const from = accMap[txn.accountId], to = accMap[txn.toAccountId];
    return (
      <button onClick={onClick} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/[0.03] active:bg-white/[0.05] transition text-left">
        <div className="h-10 w-10 rounded-2xl flex items-center justify-center bg-white/[0.06] border border-white/10"><Icon name="arrowLeftRight" size={16} className="text-white/70"/></div>
        <div className="flex-1 min-w-0"><div className="text-[14px] font-medium truncate">{txn.note || "Transfer"}</div><div className="text-[11px] text-white/40 truncate">{from?.emoji} {from?.name} → {to?.emoji} {to?.name} · {relDay(txn.date)}</div></div>
        <div className="text-[14px] font-semibold tabular-nums text-white/80">{fmtMoney(txn.amount, currency)}</div>
      </button>
    );
  }
  const acc = accMap[txn.accountId];
  return (
    <button onClick={onClick} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/[0.03] active:bg-white/[0.05] transition text-left">
      <div className="h-10 w-10 rounded-2xl flex items-center justify-center text-lg" style={{ background: (cat?.color || "#94a3b8")+"22", border: `1px solid ${(cat?.color || "#94a3b8")}33` }}>{cat?.emoji || "✨"}</div>
      <div className="flex-1 min-w-0"><div className="text-[14px] font-medium truncate flex items-center gap-1.5">{txn.note || cat?.name || "Transaction"}{txn.isRecurring && <Icon name="repeat" size={11} className="text-white/30"/>}</div><div className="text-[11px] text-white/40 truncate">{cat?.name}{acc ? ` · ${acc.emoji} ${acc.name}` : ""} · {relDay(txn.date)}</div></div>
      <div className={`text-[14px] font-semibold tabular-nums ${isExpense ? "text-rose-300" : "text-emerald-300"}`}>{isExpense ? "−" : "+"}{fmtMoney(txn.amount, currency).replace("-","")}</div>
    </button>
  );
}

function TransactionsScreen({ periodTxns, catMap, accMap, accounts, settings, acctFilter, setAcctFilter, onEditTxn }) {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("all");
  const filtered = periodTxns.filter((t) => {
    if (filter !== "all" && t.type !== filter) return false;
    if (acctFilter && t.accountId !== acctFilter && t.toAccountId !== acctFilter) return false;
    if (!q) return true;
    const cat = catMap[t.categoryId];
    return (t.note || "").toLowerCase().includes(q.toLowerCase()) || (cat?.name || "").toLowerCase().includes(q.toLowerCase());
  });
  const groups = useMemo(() => { const m = new Map(); for (const t of filtered) { const k = new Date(t.date).toDateString(); if (!m.has(k)) m.set(k, []); m.get(k).push(t); } return [...m.entries()]; }, [filtered]);
  return (
    <div className="space-y-4">
      <Glass className="p-2 flex items-center gap-2"><Icon name="search" size={16} className="text-white/40 ml-2"/><input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search transactions" className="flex-1 bg-transparent outline-none text-sm placeholder:text-white/30 py-2"/></Glass>
      <div className="flex gap-2">{[{k:"all",label:"All"},{k:"expense",label:"Expenses"},{k:"income",label:"Income"},{k:"transfer",label:"Transfers"}].map((f) => (<button key={f.k} onClick={() => setFilter(f.k)} className={`px-3.5 py-1.5 rounded-full text-xs border transition ${filter === f.k ? "bg-white/15 border-white/30 text-white" : "bg-white/[0.03] border-white/10 text-white/60"}`}>{f.label}</button>))}</div>
      <div className="flex gap-2 overflow-x-auto pb-1">
        <button onClick={() => setAcctFilter(null)} className={`px-3 py-1.5 rounded-full text-xs border whitespace-nowrap transition ${!acctFilter ? "bg-white/15 border-white/30" : "bg-white/[0.03] border-white/10 text-white/60"}`}>All accounts</button>
        {accounts.map((a) => (<button key={a.id} onClick={() => setAcctFilter(acctFilter === a.id ? null : a.id)} className={`px-3 py-1.5 rounded-full text-xs border whitespace-nowrap transition ${acctFilter === a.id ? "bg-white/15 border-white/30" : "bg-white/[0.03] border-white/10 text-white/60"}`}>{a.emoji} {a.name}</button>))}
      </div>
      {groups.length === 0 ? (<Glass className="p-8 text-center text-white/40 text-sm">No transactions match.</Glass>) : (groups.map(([day, items]) => (<div key={day}><div className="text-[11px] uppercase tracking-[0.18em] text-white/40 px-2 mb-1.5">{relDay(day)}</div><Glass className="divide-y divide-white/5 overflow-hidden">{items.map((t) => <TxnRow key={t.id} txn={t} cat={catMap[t.categoryId]} accMap={accMap} currency={settings.currency} onClick={() => onEditTxn(t)}/>)}</Glass></div>)))}
    </div>
  );
}

function InsightsScreen({ state, catMap, settings, period, totals }) {
  const byCat = useMemo(() => { const m = new Map(); state.transactions.filter((t) => { const d = new Date(t.date); return d >= period.start && d < period.end && t.type === "expense"; }).forEach((t) => m.set(t.categoryId, (m.get(t.categoryId) || 0) + t.amount)); return [...m.entries()].map(([cid,v]) => ({ cat: catMap[cid], value: v })).filter((x) => x.cat).sort((a,b) => b.value - a.value); }, [state.transactions, catMap, period]);
  const trend = useMemo(() => { const arr = []; for (let i = -3; i <= 0; i++) { const p = getPeriod(settings.periodStartDay, i); const spent = state.transactions.filter((t) => t.type === "expense" && new Date(t.date) >= p.start && new Date(t.date) < p.end).reduce((s,t) => s+t.amount, 0); arr.push({ label: p.start.toLocaleDateString(undefined, { month: "short" }), value: spent, isCurrent: i === 0 }); } return arr; }, [state.transactions, settings.periodStartDay]);
  const past3 = trend.slice(0,3);
  const avg3 = past3.reduce((s,x) => s+x.value, 0) / Math.max(1, past3.filter((x) => x.value>0).length || 1);
  const current = trend[trend.length-1].value;
  const delta = avg3 > 0 ? ((current-avg3)/avg3)*100 : 0;
  const up = delta > 0;
  const band = savingRateBand(totals.savingRate);
  const trendColor = up ? "#fb7185" : "#34d399";
  return (
    <div className="space-y-4">
      <Glass className="p-5">
        <div className="flex items-start justify-between">
          <div><div className="text-xs uppercase tracking-[0.16em] text-white/50">Spending trend</div><div className="mt-2 text-3xl font-semibold tabular-nums">{fmtMoney(current, settings.currency)}</div><div className="mt-1 text-xs text-white/50 flex items-center gap-1.5"><span className={`inline-flex items-center gap-0.5 ${up ? "text-rose-300" : "text-emerald-300"}`}><Icon name={up ? "arrowUpRight" : "arrowDownRight"} size={12}/>{Math.abs(delta).toFixed(0)}%</span> vs 3-month avg ({fmtMoney(avg3, settings.currency)})</div></div>
          <Icon name={up ? "trendingUp" : "trendingDown"} size={24} className={up ? "text-rose-300" : "text-emerald-300"}/>
        </div>
        <div className="h-24 mt-3 -mx-2"><MiniArea data={trend} color={trendColor}/></div>
      </Glass>
      <Glass className="p-5">
        <div className="text-xs uppercase tracking-[0.16em] text-white/50">Saving rate</div>
        <div className="flex items-end justify-between mt-2"><div className="text-4xl font-semibold tabular-nums" style={{ textShadow: `0 0 24px ${band.glow}` }}>{totals.savingRate.toFixed(1)}%</div><Pill color={band.color} glow={band.glow}>{band.label}</Pill></div>
        <div className="relative h-2 mt-4 rounded-full bg-white/[0.06] overflow-hidden"><div className="absolute inset-y-0 left-0 rounded-full transition-all" style={{ width: `${Math.min(100, Math.max(0, totals.savingRate))}%`, background: `linear-gradient(90deg, ${band.color}, ${band.color}aa)`, boxShadow: `0 0 12px ${band.glow}` }}/></div>
        <div className="grid grid-cols-4 mt-2 text-[10px] text-white/40"><div>0%</div><div className="text-center">8%</div><div className="text-center">15%</div><div className="text-right">20%+</div></div>
        <div className="mt-3 text-xs text-white/50 leading-relaxed">0–8% Starting · 8–15% Building · 15–20% Strong · 20%+ Excellent</div>
      </Glass>
      <Glass className="p-5">
        <div className="text-xs uppercase tracking-[0.16em] text-white/50 mb-3">Top spending</div>
        {byCat.length === 0 ? <div className="text-white/40 text-sm py-4 text-center">No expenses this period.</div> : (
          <div className="flex items-center gap-4">
            <div className="h-32 w-32 shrink-0 relative"><Donut segments={byCat.map((x) => ({ value: x.value, color: x.cat.color }))} size={128} thickness={20}/><div className="absolute inset-0 flex flex-col items-center justify-center text-center"><div className="text-[9px] uppercase tracking-wider text-white/40">Total</div><div className="text-[13px] font-semibold tabular-nums">{fmtMoney(byCat.reduce((s,x) => s+x.value, 0), settings.currency)}</div></div></div>
            <div className="flex-1 space-y-1.5">{byCat.slice(0,5).map((x) => (<div key={x.cat.id} className="flex items-center gap-2 text-xs"><span className="h-2 w-2 rounded-full" style={{ background: x.cat.color }}/><span className="text-white/70 flex-1 truncate">{x.cat.emoji} {x.cat.name}</span><span className="tabular-nums text-white/90">{fmtMoney(x.value, settings.currency)}</span></div>))}</div>
          </div>
        )}
      </Glass>
      <Glass className="p-5"><div className="text-xs uppercase tracking-[0.16em] text-white/50 mb-3">Last 4 periods</div><div className="h-32"><MiniBar data={trend}/></div></Glass>
    </div>
  );
}

function PlannedScreen({ periodTxns, recurring, catMap, accMap, settings, onOpenRecurring, onDeleteRecurring, onToggleRecurring }) {
  const upcoming = periodTxns.filter((t) => new Date(t.date) > new Date()).sort((a,b) => new Date(a.date) - new Date(b.date));
  return (
    <div className="space-y-4">
      <Glass className="p-5">
        <div className="flex items-center justify-between mb-3"><div><div className="text-xs uppercase tracking-[0.16em] text-white/50">Upcoming this period</div><div className="text-2xl font-semibold tabular-nums mt-1">{fmtMoney(upcoming.reduce((s,t) => s + (t.type === "expense" ? t.amount : 0), 0), settings.currency)}</div></div><Icon name="calendarClock" size={24} className="text-cyan-300"/></div>
        {upcoming.length === 0 ? <div className="text-white/40 text-sm py-6 text-center">Nothing upcoming. You're clear.</div> : (<div className="space-y-2">{upcoming.map((t) => { const cat = catMap[t.categoryId]; return (<div key={t.id} className="flex items-center gap-3 py-1.5"><div className="h-9 w-9 rounded-xl flex items-center justify-center" style={{ background: (cat?.color || "#94a3b8")+"22", border: `1px solid ${(cat?.color || "#94a3b8")}33` }}>{cat?.emoji}</div><div className="flex-1 min-w-0"><div className="text-sm font-medium truncate flex items-center gap-1.5">{t.note || cat?.name}{t.isRecurring && <Icon name="repeat" size={10} className="text-white/30"/>}</div><div className="text-[11px] text-white/40">{relDay(t.date)}{accMap[t.accountId] ? ` · ${accMap[t.accountId].emoji} ${accMap[t.accountId].name}` : ""}</div></div><div className={`text-sm tabular-nums ${t.type === "expense" ? "text-rose-300" : "text-emerald-300"}`}>{t.type === "expense" ? "−" : "+"}{fmtMoney(t.amount, settings.currency).replace("-","")}</div></div>); })}</div>)}
      </Glass>
      <div className="flex items-center justify-between px-1"><div className="text-sm font-medium text-white/80 flex items-center gap-2"><Icon name="repeat" size={14}/> Recurring</div><PressableGlass className="px-3 py-1.5 text-xs" onClick={onOpenRecurring}><span className="flex items-center gap-1"><Icon name="plus" size={12}/> New</span></PressableGlass></div>
      {recurring.length === 0 ? (<Glass className="p-6 text-center text-white/40 text-sm">No recurring bills yet. Add subscriptions, rent, salary and they'll auto-deduct each period.</Glass>) : (<Glass className="divide-y divide-white/5 overflow-hidden">{recurring.map((r) => { const cat = catMap[r.categoryId], acc = accMap[r.accountId]; return (<div key={r.id} className="flex items-center gap-3 px-4 py-3"><div className="h-10 w-10 rounded-2xl flex items-center justify-center" style={{ background: (cat?.color || "#94a3b8")+"22", border: `1px solid ${(cat?.color || "#94a3b8")}33` }}>{cat?.emoji}</div><div className="flex-1 min-w-0"><div className="text-sm font-medium truncate">{r.name}</div><div className="text-[11px] text-white/40 truncate">Day {r.dayOfMonth} · {cat?.name}{acc ? ` · ${acc.emoji} ${acc.name}` : ""}</div></div><div className={`text-sm tabular-nums ${r.type === "expense" ? "text-rose-300" : "text-emerald-300"} ${!r.active ? "opacity-40" : ""}`}>{r.type === "expense" ? "−" : "+"}{fmtMoney(r.amount, settings.currency).replace("-","")}</div><button className="ml-2 p-1.5 rounded-lg hover:bg-white/5 active:scale-95" onClick={() => onToggleRecurring(r)}>{r.active ? <Icon name="check" size={14} className="text-emerald-300"/> : <Icon name="alertCircle" size={14} className="text-white/40"/>}</button><button className="p-1.5 rounded-lg hover:bg-white/5 active:scale-95" onClick={() => onDeleteRecurring(r.id)}><Icon name="trash" size={14} className="text-white/40"/></button></div>); })}</Glass>)}
    </div>
  );
}

function TabBar({ tab, setTab, onAdd }) {
  const tabs = [{ k: "home", icon: "home", label: "Home" }, { k: "transactions", icon: "receipt", label: "Log" }, { k: "insights", icon: "barChart", label: "Insights" }, { k: "planned", icon: "calendarClock", label: "Planned" }];
  return (
    <div className="fixed bottom-4 left-0 right-0 mx-auto px-4 max-w-[480px] z-40">
      <div className="relative">
        <div className="flex items-center justify-around rounded-full border border-white/10 bg-white/[0.05] backdrop-blur-2xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] px-2 py-2" style={{ backgroundImage: "linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.0) 60%)" }}>
          {tabs.slice(0,2).map((t) => <TabBtn key={t.k} {...t} active={tab === t.k} onClick={() => setTab(t.k)}/>)}

      </div>
    </div>
  );
}
function TabBtn({ icon, label, active, onClick }) {
  return (<button onClick={onClick} className="flex flex-col items-center gap-0.5 px-3 py-1.5 transition active:scale-95"><Icon name={icon} size={20} className={active ? "text-white" : "text-white/40"}/><div className={`text-[9px] uppercase tracking-wider ${active ? "text-white" : "text-white/40"}`}>{label}</div></button>);
}

function Sheet({ title, onClose, children, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"/>
      <div onClick={(e) => e.stopPropagation()} className="relative w-full max-w-[480px] max-h-[90vh] overflow-y-auto rounded-t-[28px] border-t border-x border-white/10 bg-[#0b0c14]/90 backdrop-blur-2xl shadow-[0_-12px_60px_rgba(0,0,0,0.6)]" style={{ backgroundImage: "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100px)" }}>
        <div className="sticky top-0 z-10 flex items-center justify-between px-5 py-4 backdrop-blur-2xl bg-[#0b0c14]/70 border-b border-white/5"><div className="text-sm font-semibold">{title}</div><button onClick={onClose} className="p-1.5 rounded-full bg-white/5 active:scale-90 transition"><Icon name="x" size={16}/></button></div>
        <div className="px-5 py-5">{children}</div>
        {footer && <div className="sticky bottom-0 px-5 py-4 backdrop-blur-2xl bg-[#0b0c14]/80 border-t border-white/5">{footer}</div>}
      </div>
    </div>
  );
}

function AddSheet({ initial, startType, categories, accounts, settings, onClose, onSave, onDelete }) {
  const [type, setType] = useState(initial?.type || startType || "expense");
  const [amount, setAmount] = useState(initial ? String(initial.amount) : "");
  const [categoryId, setCategoryId] = useState(initial?.categoryId || categories.find((c) => c.type === (initial?.type || startType || "expense"))?.id);
  const [accountId, setAccountId] = useState(initial?.accountId || accounts[0]?.id);
  const [toAccountId, setToAccountId] = useState(initial?.toAccountId || accounts.find((a) => a.id !== (initial?.accountId || accounts[0]?.id))?.id || accounts[0]?.id);
  const [note, setNote] = useState(initial?.note || "");
  const [date, setDate] = useState(initial?.date ? new Date(initial.date).toISOString().slice(0,10) : new Date().toISOString().slice(0,10));
  const isTransfer = type === "transfer";
  const filteredCats = categories.filter((c) => c.type === type);
  useEffect(() => { if (!isTransfer && !filteredCats.find((c) => c.id === categoryId)) setCategoryId(filteredCats[0]?.id); }, [type]);
  useEffect(() => { if (isTransfer && accountId === toAccountId) { const o = accounts.find((a) => a.id !== accountId); if (o) setToAccountId(o.id); } }, [accountId, type]);
  const valid = (() => { const amt = parseFloat(amount); if (!amt || amt <= 0) return false; if (isTransfer) return accountId && toAccountId && accountId !== toAccountId; return categoryId && accountId; })();
  const submit = () => { if (!valid) return; const amt = parseFloat(amount); if (isTransfer) onSave({ id: initial?.id || uid(), type: "transfer", amount: amt, accountId, toAccountId, note: note.trim(), date: new Date(date).toISOString() }); else onSave({ id: initial?.id || uid(), type, amount: amt, categoryId, accountId, note: note.trim(), date: new Date(date).toISOString(), recurringId: initial?.recurringId }); };
  return (
    <Sheet title={initial ? "Edit transaction" : isTransfer ? "New transfer" : "New transaction"} onClose={onClose} footer={(
      <div className="flex gap-2">
        {initial && onDelete && <button onClick={() => onDelete(initial.id)} className="px-4 py-3 rounded-2xl bg-rose-500/15 border border-rose-500/30 text-rose-300 text-sm font-medium active:scale-95 transition"><Icon name="trash" size={16}/></button>}
        <button onClick={submit} disabled={!valid} className="flex-1 py-3 rounded-2xl text-sm font-semibold text-white active:scale-95 transition disabled:opacity-40" style={{ background: "linear-gradient(135deg, #22d3ee 0%, #6366f1 60%, #c026d3 100%)", boxShadow: "0 0 24px rgba(99,102,241,0.4)" }}>{initial ? "Save changes" : isTransfer ? "Add transfer" : "Add transaction"}</button>
      </div>
    )}>
      <div className="grid grid-cols-3 gap-1 mb-5 p-1 rounded-2xl bg-white/[0.04] border border-white/10">{["expense","income","transfer"].map((t) => (<button key={t} onClick={() => setType(t)} className={`py-2.5 rounded-xl text-[13px] font-medium capitalize transition ${type === t ? "bg-white/15 text-white" : "text-white/50"}`}>{t}</button>))}</div>
      <div className="flex flex-col items-center mb-6"><div className="text-xs text-white/40 uppercase tracking-wider mb-2">Amount</div><div className="flex items-baseline gap-1"><span className="text-3xl text-white/40 font-light tabular-nums">{CURRENCIES[settings.currency]}</span><input type="text" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^0-9.]/g,""))} placeholder="0" className="bg-transparent outline-none text-5xl font-semibold tabular-nums text-center w-48" style={{ caretColor: "#22d3ee" }}/></div></div>
      {isTransfer ? (
        <>
          <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">From</div>
          <div className="mb-4"><AccountChips accounts={accounts} value={accountId} onChange={setAccountId}/></div>
          <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">To</div>
          <div className="mb-5"><AccountChips accounts={accounts.filter((a) => a.id !== accountId)} value={toAccountId} onChange={setToAccountId}/></div>
        </>
      ) : (
        <>
          <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">Category</div>
          <div className="grid grid-cols-4 gap-2 mb-5">{filteredCats.map((c) => (<button key={c.id} onClick={() => setCategoryId(c.id)} className={`flex flex-col items-center justify-center gap-1 py-3 rounded-2xl border transition active:scale-95 ${categoryId === c.id ? "border-white/30 bg-white/[0.08]" : "border-white/10 bg-white/[0.02]"}`} style={categoryId === c.id ? { boxShadow: `inset 0 0 12px ${c.color}33, 0 0 14px ${c.color}33` } : {}}><div className="text-xl">{c.emoji}</div><div className="text-[10px] text-white/60 truncate w-full text-center px-1">{c.name}</div></button>))}</div>
          <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">Account</div>
          <div className="mb-5"><AccountChips accounts={accounts} value={accountId} onChange={setAccountId}/></div>
        </>
      )}
      <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">Note</div>
      <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Optional" className="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-sm placeholder:text-white/30 outline-none focus:border-white/30 mb-5"/>
      <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">Date</div>
      <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full bg-white/[0.04] border border-white/10 rounded-2xl px-4 py-3 text-sm outline-none focus:border-white/30 [color-scheme:dark]"/>
    </Sheet>
  );
}

function SettingsSheet({ settings, categories, accounts, transactions, initialTab, onClose, onUpdate, onUpsertCategory, onDeleteCategory, onUpsertAccount, onDeleteAccount, onExportCSV, onImportCSV, onReset }) {
  const [tab, setTab] = useState(initialTab || "general");
  const fileRef = useRef(null);
  return (
    <Sheet title="Settings" onClose={onClose}>
      <div className="grid grid-cols-4 gap-1 p-1 rounded-2xl bg-white/[0.04] border border-white/10 mb-5 text-[11px]">{["general","accounts","categories","data"].map((t) => (<button key={t} onClick={() => setTab(t)} className={`py-2 rounded-xl capitalize transition ${tab === t ? "bg-white/15 text-white" : "text-white/50"}`}>{t}</button>))}</div>
      {tab === "general" && (
        <div className="space-y-4">
          <Field label="Your name"><input value={settings.name} onChange={(e) => onUpdate({ name: e.target.value })} className="bg-transparent outline-none w-full text-right"/></Field>
          <Field label="Currency"><select value={settings.currency} onChange={(e) => onUpdate({ currency: e.target.value })} className="bg-transparent outline-none text-right [&>option]:bg-[#0b0c14]">{Object.entries(CURRENCIES).map(([k,sym]) => <option key={k} value={k}>{k} · {sym}</option>)}</select></Field>
          <Field label="Expected income"><div className="flex items-center gap-1"><span className="text-white/40">{CURRENCIES[settings.currency]}</span><input type="number" value={settings.expectedIncome} onChange={(e) => onUpdate({ expectedIncome: parseFloat(e.target.value) || 0 })} className="bg-transparent outline-none text-right tabular-nums w-32"/></div></Field>
          <Field label="Period starts day"><input type="number" min="1" max="28" value={settings.periodStartDay} onChange={(e) => onUpdate({ periodStartDay: Math.min(28, Math.max(1, parseInt(e.target.value) || 1)) })} className="bg-transparent outline-none text-right tabular-nums w-16"/></Field>
          <div className="text-[11px] text-white/40 leading-relaxed mt-3 px-1">Your budget cycle starts on this day each month. Set it to your payday. Transfers between accounts never affect your budget or saving rate.</div>
        </div>
      )}
      {tab === "accounts" && <AccountEditor accounts={accounts} transactions={transactions} settings={settings} onUpsert={onUpsertAccount} onDelete={onDeleteAccount}/>}
      {tab === "categories" && <CategoryEditor categories={categories} onUpsert={onUpsertCategory} onDelete={onDeleteCategory}/>}
      {tab === "data" && (
        <div className="space-y-3">
          <PressableGlass onClick={onExportCSV} className="w-full py-3 px-4 flex items-center gap-3 text-left"><Icon name="download" size={16}/> <span className="text-sm">Export to CSV</span></PressableGlass>
          <PressableGlass onClick={() => fileRef.current?.click()} className="w-full py-3 px-4 flex items-center gap-3 text-left"><Icon name="upload" size={16}/> <span className="text-sm">Import from CSV</span></PressableGlass>
          <input type="file" accept=".csv,text/csv" ref={fileRef} className="hidden" onChange={(e) => { const f = e.target.files?.[0]; if (f) onImportCSV(f); e.target.value = ""; }}/>
          <div className="text-[11px] text-white/40 px-1">Columns: date, type (expense|income|transfer), amount, category, account, to_account, note.</div>
          <button onClick={onReset} className="w-full py-3 px-4 rounded-2xl bg-rose-500/10 border border-rose-500/30 text-rose-300 text-sm font-medium active:scale-95 transition mt-4 flex items-center justify-center gap-2"><Icon name="trash" size={14}/> Erase all data</button>
        </div>
      )}
    </Sheet>
  );
}

function AccountEditor({ accounts, transactions, settings, onUpsert, onDelete }) {
  const [editing, setEditing] = useState(null);
  const empty = { id: "", name: "", type: "cash", emoji: "💵", color: "#34d399", startingBalance: 0 };
  if (editing) {
    return (
      <div className="space-y-4">
        <Field label="Name"><input value={editing.name} onChange={(e) => setEditing({ ...editing, name: e.target.value })} placeholder="e.g. BPI Savings" className="bg-transparent outline-none text-right w-44 placeholder:text-white/30"/></Field>
        <Field label="Type"><select value={editing.type} onChange={(e) => { const t = e.target.value; setEditing({ ...editing, type: t, emoji: ACCOUNT_TYPES[t].emoji, color: ACCOUNT_TYPES[t].color }); }} className="bg-transparent outline-none text-right [&>option]:bg-[#0b0c14]">{Object.entries(ACCOUNT_TYPES).map(([k,v]) => <option key={k} value={k}>{v.emoji} {v.label}</option>)}</select></Field>
        <Field label="Starting balance"><div className="flex items-center gap-1"><span className="text-white/40">{CURRENCIES[settings.currency]}</span><input type="number" value={editing.startingBalance} onChange={(e) => setEditing({ ...editing, startingBalance: parseFloat(e.target.value) || 0 })} className="bg-transparent outline-none text-right tabular-nums w-28"/></div></Field>

        <div className="grid grid-cols-8 gap-2 p-2 rounded-2xl bg-white/[0.03] border border-white/10">{EMOJI_PICKS.map((e) => <button key={e} onClick={() => setEditing({ ...editing, emoji: e })} className={`text-lg p-1.5 rounded-lg ${editing.emoji === e ? "bg-white/15" : ""}`}>{e}</button>)}</div>

        <div className="flex gap-2 pt-2"><button onClick={() => setEditing(null)} className="flex-1 py-3 rounded-2xl bg-white/5 border border-white/10 text-sm">Cancel</button><button disabled={!editing.name} onClick={() => { onUpsert({ ...editing, id: editing.id || uid() }); setEditing(null); }} className="flex-1 py-3 rounded-2xl text-sm font-semibold text-white active:scale-95 transition disabled:opacity-40" style={{ background: "linear-gradient(135deg, #22d3ee 0%, #6366f1 100%)" }}>Save</button></div>
      </div>
    );

  return (
    <div className="space-y-2">
      <button onClick={() => setEditing(empty)} className="w-full py-3 rounded-2xl border border-dashed border-white/15 text-sm text-white/60 active:scale-95 transition flex items-center justify-center gap-2"><Icon name="plus" size={14}/> New account</button>
      {accounts.map((a) => { const bal = accountBalance(a, transactions); return (<div key={a.id} className="flex items-center gap-3 px-4 py-2.5 rounded-2xl bg-white/[0.03] border border-white/5"><div className="h-9 w-9 rounded-xl flex items-center justify-center text-lg" style={{ background: a.color + "22", border: `1px solid ${a.color}33` }}>{a.emoji}</div><div className="flex-1 min-w-0"><div className="text-sm truncate">{a.name}</div><div className="text-[10px] text-white/40 uppercase">{ACCOUNT_TYPES[a.type]?.label || a.type} · <span className="tabular-nums normal-case">{fmtMoney(bal, settings.currency)}</span></div></div><button onClick={() => setEditing(a)} className="p-1.5 rounded-lg hover:bg-white/5"><Icon name="edit" size={14} className="text-white/50"/></button>{accounts.length > 1 && <button onClick={() => { if (confirm(`Delete "${a.name}"? Its transactions stay but won't count toward any account balance.`)) onDelete(a.id); }} className="p-1.5 rounded-lg hover:bg-white/5"><Icon name="trash" size={14} className="text-white/40"/></button>}</div>); })}
      <div className="text-[11px] text-white/40 px-1 pt-1">Balance = starting balance + income − expenses ± transfers, counting only entries dated today or earlier.</div>
    </div>
  );
}

    <div className="space-y-2">
      <button onClick={() => setEditing(empty)} className="w-full py-3 rounded-2xl border border-dashed border-white/15 text-sm text-white/60 active:scale-95 transition flex items-center justify-center gap-2"><Icon name="plus" size={14}/> New category</button>
      {categories.map((c) => (<div key={c.id} className="flex items-center gap-3 px-4 py-2.5 rounded-2xl bg-white/[0.03] border border-white/5"><div className="h-9 w-9 rounded-xl flex items-center justify-center" style={{ background: c.color + "22", border: `1px solid ${c.color}33` }}>{c.emoji}</div><div className="flex-1 min-w-0"><div className="text-sm">{c.name}</div><div className="text-[10px] text-white/40 uppercase">{c.type}</div></div><button onClick={() => setEditing(c)} className="p-1.5 rounded-lg hover:bg-white/5"><Icon name="edit" size={14} className="text-white/50"/></button><button onClick={() => onDelete(c.id)} className="p-1.5 rounded-lg hover:bg-white/5"><Icon name="trash" size={14} className="text-white/40"/></button></div>))}
    </div>
  );
}

function RecurringSheet({ categories, accounts, settings, onClose, onUpsert }) {
  const [name, setName] = useState("");
  const [amount, setAmount] = useState("");
  const [type, setType] = useState("expense");
  const [categoryId, setCategoryId] = useState(categories.find((c) => c.type === "expense")?.id);
  const [accountId, setAccountId] = useState(accounts[0]?.id);
  const [dayOfMonth, setDayOfMonth] = useState(1);
  const filteredCats = categories.filter((c) => c.type === type);
  useEffect(() => { if (!filteredCats.find((c) => c.id === categoryId)) setCategoryId(filteredCats[0]?.id); }, [type]);
  const submit = () => { if (!name || !amount || !categoryId || !accountId) return; onUpsert({ id: uid(), name: name.trim(), amount: parseFloat(amount), type, categoryId, accountId, dayOfMonth: Math.min(28, Math.max(1, parseInt(dayOfMonth) || 1)), active: true }); onClose(); };
  return (
    <Sheet title="New recurring" onClose={onClose}>
      <div className="grid grid-cols-2 gap-2 mb-4 p-1 rounded-2xl bg-white/[0.04] border border-white/10">{["expense","income"].map((t) => <button key={t} onClick={() => setType(t)} className={`py-2.5 rounded-xl text-sm transition ${type === t ? "bg-white/15" : "text-white/50"}`}>{t === "expense" ? "Bill" : "Income"}</button>)}</div>
      <Field label="Name"><input value={name} onChange={(e) => setName(e.target.value)} placeholder="Rent, Netflix…" className="bg-transparent outline-none text-right w-40 placeholder:text-white/30"/></Field>
      <div className="mt-3"/><Field label="Amount"><div className="flex items-center gap-1"><span className="text-white/40">{CURRENCIES[settings.currency]}</span><input type="text" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^0-9.]/g,""))} placeholder="0" className="bg-transparent outline-none text-right tabular-nums w-24 placeholder:text-white/30"/></div></Field>
      <div className="mt-3"/><Field label="Day of month"><input type="number" min="1" max="28" value={dayOfMonth} onChange={(e) => setDayOfMonth(e.target.value)} className="bg-transparent outline-none text-right tabular-nums w-16"/></Field>
      <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 px-1 mt-4 mb-2">Category</div>
      <div className="grid grid-cols-4 gap-2 mb-4">{filteredCats.map((c) => <button key={c.id} onClick={() => setCategoryId(c.id)} className={`flex flex-col items-center gap-1 py-3 rounded-2xl border transition ${categoryId === c.id ? "border-white/30 bg-white/[0.08]" : "border-white/10 bg-white/[0.02]"}`}><div className="text-xl">{c.emoji}</div><div className="text-[10px] text-white/60 truncate w-full text-center px-1">{c.name}</div></button>)}</div>
      <div className="text-[11px] uppercase tracking-[0.16em] text-white/40 mb-2">Account</div>
      <div className="mb-5"><AccountChips accounts={accounts} value={accountId} onChange={setAccountId}/></div>
      <button onClick={submit} disabled={!name || !amount || !categoryId || !accountId} className="w-full py-3 rounded-2xl text-sm font-semibold active:scale-95 transition disabled:opacity-40" style={{ background: "linear-gradient(135deg, #22d3ee 0%, #6366f1 60%, #c026d3 100%)", boxShadow: "0 0 24px rgba(99,102,241,0.4)" }}>Add recurring</button>
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
